<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoastieSpouseCC - Contacts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --navy: #003087;
      --gold: #C5A028;
    }
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .navbar-brand { color: var(--gold) !important; }
    .nav-link:hover { color: var(--gold) !important; }
    .page-header {
      background-color: var(--navy);
      color: #fff;
      padding: 3rem 1rem;
    }
    .page-header-accent {
      display: inline-block;
      width: 50px;
      height: 3px;
      background-color: var(--gold);
      margin-bottom: 1rem;
    }
    th { background-color: var(--navy); color: #fff; }
    .badge-admin { background-color: var(--gold); color: #000; }
    main { flex: 1; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: var(--navy);">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="/index.html">CoastieSpouseCC</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="/members.html">Contacts</a></li>
          <li class="nav-item"><a class="nav-link" href="/news.html">News</a></li>
          <li class="nav-item"><a class="nav-link" href="/events.html">Events</a></li>
          <li class="nav-item"><a class="nav-link" href="/resources.html">Resources</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <div class="page-header text-center">
      <div class="page-header-accent mx-auto"></div>
      <h1 class="fw-bold mb-2">Our Contacts</h1>
      <p class="mb-0 opacity-75">The heart of our community</p>
    </div>

    <div class="container py-5">
      <div class="table-responsive shadow-sm rounded">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">Name</th>
              <th scope="col">Spouse</th>
              <th scope="col">Phone</th>
              <th scope="col">Address</th>
              <th scope="col">Role</th>
            </tr>
          </thead>
          <tbody id="members-table-body">
            <tr>
              <td colspan="6" class="text-center text-muted py-4">No contacts to display yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="text-white text-center py-4" style="background-color: var(--navy);">
    <p class="mb-1">Supporting Coast Guard Families Together</p>
    <p class="mb-0 small">&copy; 2025 CoastieSpouseCC. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
